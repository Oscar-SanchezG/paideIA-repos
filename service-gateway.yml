spring:
  application:
    name: service-gateway
  security:
    enabled: false
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true
      routes:
        - id: paide-auth-auth
          uri: lb://PAIDEIA-AUTHENTICATION-SERVICE
          predicates:
            - Path=/api/paide/auth/**
        - id: inube-auth-user
          uri: lb://PAIDEIA-AUTHENTICATION-SERVICE
          predicates:
            - Path=/api/paide/user/**
        - id: books-service
          uri: lb://BOOKS-SERVICE
          predicates:
            - Path=/api/paide/books/**
          filters:
            - AuthenticationFilter
          
   

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8106/eureka/
    registerWithEureka: true
    fetchRegistry: true
    healthcheck:
      enabled: true
  instance:
    leaseRenewalIntervalInSeconds: 5
    leaseExpirationDurationInSeconds: 15
    preferIpAddress: true

jwt:
  secret: e4b7f9d2a13c4efb92d7c31ae8f04c9bd3e27fa649c8d1e0b57a23cf8b9e41ac

server:

  port: 8107

